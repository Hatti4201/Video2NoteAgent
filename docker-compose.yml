services:
  video-note-agent:
    build: .
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./secrets:/app/secrets:ro

  telegram-bot:
    build: .
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./secrets:/app/secrets:ro
    command: ["telegram"]
    restart: unless-stopped
